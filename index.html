<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            height: 100vh;
            display: flex;
        }

        /* LEFT PANEL (branding style like real SaaS apps) */
        .left-panel {
            flex: 1;
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .left-panel h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .left-panel p {
            opacity: 0.8;
            line-height: 1.6;
        }

        /* RIGHT LOGIN PANEL */
        .right-panel {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f1f5f9;
        }

        .login-box {
            width: 350px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #1e293b;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            margin-top: 10px;
        }

        button:hover {
            background: #1d4ed8;
        }

        #message {
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- LEFT INFO PANEL -->
    <div class="left-panel">
        <h1>Fraud Detection System</h1>
        <p>
            Monitor and analyze return transactions in real time.
            Detect suspicious patterns and reduce fraud losses using smart analytics.
        </p>
    </div>

    <!-- RIGHT LOGIN PANEL -->
    <div class="right-panel">

        <div class="login-box">

            <h2>Admin Login</h2>

            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button onclick="login()">Login</button>

            <p id="message"></p>

        </div>

    </div>

<script>

let attempts = 0;

function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let message = document.getElementById("message");

    if (attempts >= 3) {
        message.innerHTML = "❌ Account locked. Try again later.";
        message.style.color = "red";
        return;
    }

    if (username === "admin" && password === "1234") {

        message.innerHTML = "✅ Login Successful!";
        message.style.color = "green";

        setTimeout(function () {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {

        attempts++;

        message.innerHTML =
            "❌ Invalid Login. Attempt " + attempts + " of 3";

        message.style.color = "red";

        if (attempts >= 3) {
            message.innerHTML = "❌ Account locked. Try again later.";
        }
    }
}

</script>

</body>
</html>
